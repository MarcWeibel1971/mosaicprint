[build]
builder = "nixpacks"
buildCommand = "pnpm install && pnpm build:client && pnpm build:server"

[deploy]
startCommand = "node dist/server/index.js"
healthcheckPath = "/api/health"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[[deploy.envVars]]
name = "PORT"
value = "8080"
